<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mood Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #F7F4EF;
      --card: #FFFFFF;
      --text: #1C1C1C;
      --muted: #888;
      --border: #E5E0D8;
      --accent: #C96A3A;
 
      --happy:   #F9C74F;
      --energized: #90BE6D;
      --meh:     #A8DADC;
      --anxious: #F4A261;
      --sad:     #9B89B4;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
 
    .container {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
 
    /* ── Header ── */
    header {
      text-align: center;
    }
 
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text);
    }
 
    header p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 4px;
    }
 
    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.75rem;
    }
 
    .card-title {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }
 
    /* ── Mood Picker ── */
    .mood-grid {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
 
    .mood-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 6px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: 'DM Sans', sans-serif;
    }
 
    .mood-btn:hover {
      border-color: #ccc;
      transform: translateY(-2px);
    }
 
    .mood-btn.selected {
      border-color: transparent;
      transform: translateY(-3px);
    }
 
    .mood-btn.selected[data-mood="happy"]    { background: var(--happy);    }
    .mood-btn.selected[data-mood="energized"]{ background: var(--energized); }
    .mood-btn.selected[data-mood="meh"]      { background: var(--meh);       }
    .mood-btn.selected[data-mood="anxious"]  { background: var(--anxious);   }
    .mood-btn.selected[data-mood="sad"]      { background: var(--sad);       }
 
    .mood-emoji { font-size: 1.8rem; line-height: 1; }
    .mood-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; }
    .mood-btn.selected .mood-label { color: #333; }
 
    /* ── Note Input ── */
    textarea {
      width: 100%;
      min-height: 110px;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
 
    textarea:focus { border-color: #aaa; }
    textarea::placeholder { color: #bbb; }
 
    /* ── Save Button ── */
    .save-btn {
      width: 100%;
      padding: 15px;
      background: var(--text);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      letter-spacing: 0.02em;
    }
 
    .save-btn:hover  { background: #333; }
    .save-btn:active { transform: scale(0.98); }
 
    /* ── Weekly Chart ── */
    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
 
    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
 
    .day-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 500;
    }
 
    .day-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: transform 0.2s;
      cursor: default;
      position: relative;
    }
 
    .day-dot:hover { transform: scale(1.15); }
 
    .day-dot[data-mood="happy"]    { background: var(--happy); }
    .day-dot[data-mood="energized"]{ background: var(--energized); }
    .day-dot[data-mood="meh"]      { background: var(--meh); }
    .day-dot[data-mood="anxious"]  { background: var(--anxious); }
    .day-dot[data-mood="sad"]      { background: var(--sad); }
 
    .day-dot.today {
      outline: 2.5px solid var(--text);
      outline-offset: 2px;
    }
 
    /* ── Past Entries ── */
    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
 
    .entry-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
      animation: fadeIn 0.3s ease;
    }
 
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .entry-emoji {
      font-size: 1.6rem;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .entry-emoji[data-mood="happy"]    { background: var(--happy); }
    .entry-emoji[data-mood="energized"]{ background: var(--energized); }
    .entry-emoji[data-mood="meh"]      { background: var(--meh); }
    .entry-emoji[data-mood="anxious"]  { background: var(--anxious); }
    .entry-emoji[data-mood="sad"]      { background: var(--sad); }
 
    .entry-body { flex: 1; }
 
    .entry-date {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 3px;
      font-weight: 500;
    }
 
    .entry-note {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.5;
    }
 
    .entry-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #ccc;
      padding: 0;
      transition: color 0.15s;
      flex-shrink: 0;
    }
 
    .entry-delete:hover { color: #e24b4a; }
 
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 1.5rem 0;
    }
 
    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      font-size: 0.85rem;
      padding: 10px 22px;
      border-radius: 100px;
      transition: transform 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
 
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
 
    <!-- Header -->
    <header>
      <h1>How are you feeling?</h1>
      <p id="today-date">Today, Sunday June 8</p>
    </header>
 
    <!-- Mood Picker -->
    <div class="card">
      <p class="card-title">Pick your mood</p>
      <div class="mood-grid">
        <button class="mood-btn" data-mood="happy"     onclick="selectMood(this)">
          <span class="mood-emoji">😊</span>
          <span class="mood-label">Happy</span>
        </button>
        <button class="mood-btn" data-mood="energized" onclick="selectMood(this)">
          <span class="mood-emoji">⚡</span>
          <span class="mood-label">Energized</span>
        </button>
        <button class="mood-btn" data-mood="meh"       onclick="selectMood(this)">
          <span class="mood-emoji">😐</span>
          <span class="mood-label">Meh</span>
        </button>
        <button class="mood-btn" data-mood="anxious"   onclick="selectMood(this)">
          <span class="mood-emoji">😰</span>
          <span class="mood-label">Anxious</span>
        </button>
        <button class="mood-btn" data-mood="sad"       onclick="selectMood(this)">
          <span class="mood-emoji">😔</span>
          <span class="mood-label">Sad</span>
        </button>
      </div>
    </div>
 
    <!-- Note Input -->
    <div class="card">
      <p class="card-title">Add a note</p>
      <textarea id="note-input" placeholder="What's on your mind today?"></textarea>
    </div>
 
    <!-- Save Button -->
    <button class="save-btn" onclick="saveEntry()">Save today's mood</button>
 
    <!-- Weekly Chart -->
    <div class="card">
      <p class="card-title">This week</p>
      <div class="week-row" id="week-chart"></div>
    </div>
 
    <!-- Past Entries -->
    <div class="card">
      <p class="card-title">Past entries</p>
      <div class="entries-list" id="entries-list"></div>
    </div>
 
  </div>
 
  <!-- Toast -->
  <div class="toast" id="toast">Mood saved!</div>
 
  <script>
    const MOODS = {
      happy:     '😊',
      energized: '⚡',
      meh:       '😐',
      anxious:   '😰',
      sad:       '😔'
    };
 
    let selectedMood = null;
 
    function selectMood(btn) {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood = btn.dataset.mood;
    }
 
    function getEntries() {
      return JSON.parse(localStorage.getItem('moodEntries') || '[]');
    }
 
    function saveEntries(entries) {
      localStorage.setItem('moodEntries', JSON.stringify(entries));
    }
 
    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }
 
    function saveEntry() {
      if (!selectedMood) {
        showToast('Pick a mood first!');
        return;
      }
      const entries = getEntries();
      const key = todayKey();
      const existing = entries.findIndex(e => e.date === key);
      const entry = {
        date: key,
        mood: selectedMood,
        note: document.getElementById('note-input').value.trim()
      };
      if (existing >= 0) entries[existing] = entry;
      else entries.unshift(entry);
      saveEntries(entries);
      document.getElementById('note-input').value = '';
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      selectedMood = null;
      showToast('Mood saved!');
      renderAll();
    }
 
    function deleteEntry(date) {
      const entries = getEntries().filter(e => e.date !== date);
      saveEntries(entries);
      renderAll();
    }
 
    function renderWeek() {
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const entries = getEntries();
      const today = new Date();
      const chart = document.getElementById('week-chart');
      chart.innerHTML = '';
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        const entry = entries.find(e => e.date === key);
        const isToday = i === 0;
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        const dot = document.createElement('div');
        dot.className = 'day-dot' + (isToday ? ' today' : '');
        if (entry) {
          dot.dataset.mood = entry.mood;
          dot.textContent = MOODS[entry.mood];
          dot.title = entry.note || entry.mood;
        }
        const label = document.createElement('div');
        label.className = 'day-label';
        label.textContent = days[d.getDay()];
        cell.appendChild(dot);
        cell.appendChild(label);
        chart.appendChild(cell);
      }
    }
 
    function renderEntries() {
      const entries = getEntries();
      const list = document.getElementById('entries-list');
      if (entries.length === 0) {
        list.innerHTML = '<p class="empty-state">No entries yet — log your first mood above!</p>';
        return;
      }
      list.innerHTML = entries.slice(0, 10).map(e => `
        <div class="entry-item">
          <div class="entry-emoji" data-mood="${e.mood}">${MOODS[e.mood]}</div>
          <div class="entry-body">
            <div class="entry-date">${formatDate(e.date)}</div>
            <div class="entry-note">${e.note || '<span style="color:#bbb">No note</span>'}</div>
          </div>
          <button class="entry-delete" onclick="deleteEntry('${e.date}')" title="Delete">✕</button>
        </div>
      `).join('');
    }
 
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    }
 
    function renderAll() {
      renderWeek();
      renderEntries();
    }
 
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
 
    function setTodayDate() {
      const d = new Date();
      document.getElementById('today-date').textContent =
        'Today, ' + d.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' });
    }
 
    setTodayDate();
    renderAll();
  </script>
</body>
</html>
